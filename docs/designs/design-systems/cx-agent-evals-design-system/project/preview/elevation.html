<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head><body><div class="card">
<div class="col" style="gap:10px">
  <div style="padding:14px 16px;border:1px solid var(--cds-border);background:var(--cds-bg-elevated);border-radius:8px">
    <div style="font-size:11px">Default card · border + bg-elevated, <span class="dim">no shadow</span></div>
  </div>
  <div style="padding:14px 16px;border:1px solid rgba(110,231,183,.5);background:var(--cds-bg-elevated);border-radius:8px">
    <div style="font-size:11px">Hover · <span class="mint">border → accent/50</span>, bg lift</div>
  </div>
  <div style="padding:14px 16px;border:1px solid var(--cds-border);background:var(--cds-bg-elevated);border-radius:8px;box-shadow:0 0 8px 3px rgba(110,231,183,.5)">
    <div style="font-size:11px">Span glow · <span class="mint">0 0 8px 3px rgba(110,231,183,.5)</span> · flashes 2s</div>
  </div>
  <div style="padding:14px 16px;border:1px solid var(--cds-border);background:var(--cds-bg-elevated);border-radius:8px;box-shadow:0 24px 48px -12px rgba(0,0,0,.6)">
    <div style="font-size:11px">Modal · <span class="dim">0 24px 48px -12px rgba(0,0,0,.6)</span></div>
  </div>
</div></div></body></html>
