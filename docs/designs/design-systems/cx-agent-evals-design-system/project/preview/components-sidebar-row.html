<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head><body><div class="card">
<div style="width:240px;background:#141419;border:1px solid #2a2a36;border-radius:8px;padding:8px">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px 10px;border-bottom:1px solid #2a2a36;margin-bottom:8px">
    <span class="dim" style="font-size:10px;text-transform:uppercase;letter-spacing:.12em">Agents</span>
    <button style="background:#6ee7b7;color:#0c0c0f;border:0;padding:2px 10px;border-radius:4px;font-family:inherit;font-size:10px;font-weight:500">+ New</button>
  </div>
  <div style="border-left:3px solid #6ee7b7;background:#1a1a22;border-radius:6px;padding:8px 10px 8px 8px">
    <div style="font-size:11px;color:#e8e8ed;font-weight:500">Support Agent</div>
    <div style="font-size:9px;color:#55556a;margin-top:2px">sonnet-4</div>
    <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">
      <span style="background:#141419;color:#8888a0;border-radius:4px;padding:1px 6px;font-size:8px">3 retrievers</span>
      <span style="background:rgba(110,231,183,.1);color:#6ee7b7;border-radius:9999px;padding:1px 6px;font-size:8px">ready</span>
    </div>
  </div>
  <div style="border-left:3px solid transparent;padding:8px 10px 8px 8px;margin-top:2px">
    <div style="font-size:11px;color:#8888a0">Billing Agent</div>
    <div style="font-size:9px;color:#55556a;margin-top:2px">sonnet-4</div>
    <div style="margin-top:6px;display:flex;gap:4px">
      <span style="background:#141419;color:#8888a0;border-radius:4px;padding:1px 6px;font-size:8px">1 retriever</span>
      <span style="background:rgba(251,191,36,.1);color:#fbbf24;border-radius:9999px;padding:1px 6px;font-size:8px">indexing</span>
    </div>
  </div>
</div></div></body></html>
