<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head><body><div class="card">
<div style="position:relative;background:#0c0c0f;padding:20px;border-radius:8px;overflow:hidden">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)"></div>
  <div style="position:relative;max-width:360px;margin:0 auto;background:#141419;border:1px solid #2a2a36;border-radius:8px;padding:20px;box-shadow:0 24px 48px -12px rgba(0,0,0,.6)">
    <h3 style="margin:0 0 6px;font-size:14px;font-weight:600">Delete Agent</h3>
    <p style="margin:0 0 12px;font-size:11px;color:#8888a0;line-height:1.5">This will permanently delete this agent and cannot be undone. Type <strong style="color:#e8e8ed">delete</strong> to confirm.</p>
    <input placeholder='Type "delete" to confirm' style="width:100%;background:#1a1a22;border:1px solid #2a2a36;color:#e8e8ed;font-family:inherit;font-size:11px;padding:8px 10px;border-radius:6px;outline:0;margin-bottom:12px;box-sizing:border-box">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button style="background:transparent;color:#8888a0;border:0;padding:4px 10px;font-family:inherit;font-size:11px">Cancel</button>
      <button disabled style="background:#2a2a36;color:#55556a;border:0;padding:4px 10px;border-radius:6px;font-family:inherit;font-size:11px">Delete</button>
    </div>
  </div>
</div></div></body></html>
