<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head><body><div class="card">
<div class="col" style="gap:14px">
  <div class="row" style="gap:10px;flex-wrap:wrap">
    <button style="background:#6ee7b7;color:#0c0c0f;border:0;padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer">Send</button>
    <button style="background:#6ee7b7;color:#0c0c0f;border:0;padding:6px 12px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:500">+ New</button>
    <button style="background:transparent;color:#8888a0;border:0;padding:6px 12px;font-family:inherit;font-size:12px">Clear chat</button>
    <button style="background:transparent;color:#55556a;border:0;padding:6px 12px;font-family:inherit;font-size:11px">reset</button>
    <button style="background:#f87171;color:#fff;border:0;padding:6px 12px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:500">Delete</button>
    <button disabled style="background:#2a2a36;color:#55556a;border:0;padding:6px 12px;border-radius:6px;font-family:inherit;font-size:12px;cursor:not-allowed">Delete</button>
  </div>
  <div class="dim" style="font-size:10px">primary · secondary · ghost · link · destructive · disabled</div>
</div></div></body></html>
