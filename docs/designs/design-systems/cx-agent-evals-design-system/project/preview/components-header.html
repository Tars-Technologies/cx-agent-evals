<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head><body><div class="card">
<div style="background:rgba(20,20,25,.8);backdrop-filter:blur(6px);border:1px solid #2a2a36;border-radius:8px;padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between">
  <div style="display:flex;align-items:center;gap:14px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="width:8px;height:8px;border-radius:9999px;background:#6ee7b7;animation:cds-pulse-dot 1.4s ease-in-out infinite"></span>
      <span style="font-size:12px;font-weight:600;letter-spacing:.02em">CX Agent Evals</span>
    </div>
    <span class="dim" style="font-size:11px">/</span>
    <div style="display:inline-flex;gap:2px;background:#0c0c0f;border-radius:6px;padding:2px">
      <a style="padding:3px 10px;font-size:11px;color:#6ee7b7;background:#141419;border-radius:4px">Knowledge Base</a>
      <a style="padding:3px 10px;font-size:11px;color:#8888a0">Agents</a>
      <a style="padding:3px 10px;font-size:11px;color:#8888a0">Experiments</a>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="dim" style="font-size:11px">Tars · RAG Eng</span>
    <span style="width:26px;height:26px;border-radius:9999px;background:linear-gradient(135deg,#2d6b54,#6ee7b7)"></span>
  </div>
</div></div></body></html>
