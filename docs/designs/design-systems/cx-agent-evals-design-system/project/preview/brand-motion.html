<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head><body><div class="card">
<div class="col" style="gap:14px">
  <div class="row" style="gap:14px">
    <span style="width:10px;height:10px;border-radius:9999px;background:#6ee7b7;animation:cds-pulse-dot 1.4s ease-in-out infinite"></span>
    <span style="font-size:11px"><span class="mono" style="color:#e8e8ed">pulse-dot</span> <span class="dim">· 1.4s infinite · opacity 0.4 ↔ 1 · the brand heartbeat</span></span>
  </div>
  <div class="row" style="gap:14px">
    <span style="width:6px;height:14px;background:#6ee7b7;border-radius:2px;animation:cds-pulse-dot 1s ease-in-out infinite"></span>
    <span style="font-size:11px"><span class="mono" style="color:#e8e8ed">stream-caret</span> <span class="dim">· 1s · during agent streaming</span></span>
  </div>
  <div class="row" style="gap:14px">
    <span class="cds-fade-in" style="width:120px;height:14px;background:#141419;border:1px solid #2a2a36;border-radius:4px"></span>
    <span style="font-size:11px"><span class="mono" style="color:#e8e8ed">fade-in</span> <span class="dim">· 300ms ease-out · translateY 6px</span></span>
  </div>
  <div class="row" style="gap:14px">
    <span class="cds-slide-in" style="width:120px;height:14px;background:#141419;border:1px solid #2a2a36;border-radius:4px"></span>
    <span style="font-size:11px"><span class="mono" style="color:#e8e8ed">slide-in</span> <span class="dim">· 250ms ease-out · translateX −8px</span></span>
  </div>
  <div class="row" style="gap:14px">
    <span style="width:16px;height:16px;border-radius:2px;background:rgba(110,231,183,.3);animation:cds-span-glow 2s ease-in-out infinite"></span>
    <span style="font-size:11px"><span class="mono" style="color:#e8e8ed">span-glow</span> <span class="dim">· 2s · 0 0 8px 3px accent/50 · citation flash</span></span>
  </div>
</div></div></body></html>
