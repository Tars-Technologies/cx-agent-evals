<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head><body><div class="card">
<div class="wrap">
  <div class="swatch"><div class="fill" style="background:#fbbf24"></div><div class="meta"><span class="name" style="color:#0c0c0f">warn</span><span class="hex">#FBBF24 · pending</span></div></div>
  <div class="swatch"><div class="fill" style="background:#f87171"></div><div class="meta"><span class="name" style="color:#0c0c0f">error</span><span class="hex">#F87171 · destructive</span></div></div>
</div>
<div class="row" style="margin-top:14px;gap:8px;flex-wrap:wrap">
  <span style="background:rgba(110,231,183,.1);color:#6ee7b7;border-radius:9999px;padding:2px 8px;font-size:9px">ready</span>
  <span style="background:rgba(251,191,36,.1);color:#fbbf24;border-radius:9999px;padding:2px 8px;font-size:9px">indexing</span>
  <span style="background:rgba(248,113,113,.1);color:#f87171;border-radius:9999px;padding:2px 8px;font-size:9px">error</span>
  <span class="dim" style="font-size:10px">status chips use {color}/10 bg + {color} fg</span>
</div></div></body></html>
